eureka:
  client:
    register-with-eureka: false

spring:
  applocation:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: students
          uri : http://localhost:8090
          predicates:
            - Path=/api/students/**
        - id: schools
          uri : http://localhost:8070
          predicates:
            - Path=/api/schools/**
  config:
    import: "optional:configserver:http://localhost:8888"


server:
  port:  8222

